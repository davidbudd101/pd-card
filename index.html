<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PD Card Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Oswald',sans-serif;
background:#0a0a0a;
color:white;
}

header{
background:linear-gradient(90deg,#c40000,#ff1a1a);
padding:14px;
text-align:center;
font-weight:700;
letter-spacing:4px;
}

.container{
display:flex;
gap:40px;
padding:30px;
justify-content:center;
flex-wrap:wrap;
}

.form{
width:320px;
background:#141414;
padding:20px;
border-radius:12px;
}

.form input,.form select{
width:100%;
margin:8px 0;
padding:10px;
border-radius:8px;
border:none;
background:#1f1f1f;
color:white;
}

.card{
width:740px;
height:420px;
background:linear-gradient(135deg,#e8e4dc,#d6d1c7);
border-radius:35px;
padding:30px;
position:relative;
color:#222;
box-shadow:0 10px 40px rgba(0,0,0,.7);
overflow:hidden;
}

/* hologram */

.hologram-bg{
position:absolute;
width:120%;
height:120%;
left:-10%;
top:-10%;
background:linear-gradient(
120deg,
rgba(255,0,0,.05),
rgba(255,255,0,.05),
rgba(0,255,255,.05),
rgba(0,0,255,.05)
);
mix-blend-mode:overlay;
animation:holoMove 10s linear infinite;
pointer-events:none;
}

@keyframes holoMove{
0%{transform:translateX(-10%)}
50%{transform:translateX(10%)}
100%{transform:translateX(-10%)}
}

/* scratches */

.scratches{
position:absolute;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/scratched-metal.png");
opacity:.10;
pointer-events:none;
}

/* photo */

.photo{
position:absolute;
left:40px;
top:90px;
width:140px;
height:140px;
border-radius:12px;
object-fit:cover;
border:3px solid #aaa;
cursor:move;
}

/* badge */

.badge{
position:absolute;
left:40px;
bottom:80px;
width:120px;
filter:drop-shadow(0 3px 3px rgba(0,0,0,.6));
}

/* title */

.top-title{
text-align:center;
font-size:22px;
letter-spacing:4px;
font-weight:700;
}

/* main info */

.main-info{
position:absolute;
left:220px;
top:95px;
}

.main-info h1{
margin:0;
font-size:40px;
}

.main-info h2{
margin:4px 0;
font-size:22px;
}

.callsign{
letter-spacing:3px;
font-weight:700;
}

.extra{
margin-top:8px;
font-size:15px;
font-weight:600;
}

/* contact info moved */

.bottom-info{
position:absolute;
bottom:100px;
right:40px;
text-align:right;
font-size:14px;
font-weight:600;
}

/* barcode */

.barcode{
position:absolute;
bottom:20px;
left:40px;
height:40px;
width:260px;
background:repeating-linear-gradient(
90deg,
#000,
#000 2px,
#fff 2px,
#fff 4px
);
}

.barcode-id{
position:absolute;
bottom:20px;
left:320px;
font-size:14px;
letter-spacing:3px;
}

/* signature */

.signature-strip{
position:absolute;
bottom:60px;
right:40px;
width:220px;
text-align:center;
border-top:2px solid #222;
padding-top:5px;
font-family:'Great Vibes',cursive;
font-size:24px;
}

.footer{
position:absolute;
bottom:20px;
right:40px;
font-size:12px;
opacity:.6;
}

button{
padding:12px 25px;
background:linear-gradient(90deg,#c40000,#ff1a1a);
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.download{
text-align:center;
margin-bottom:30px;
}

</style>

</head>

<body>

<header>PD CARD DESIGNER</header>

<div class="container">

<div class="form">

<input id="name" placeholder="Officer Name">
<input id="rank" placeholder="Rank">
<input id="callsign" placeholder="Callsign">
<input id="badgeNum" placeholder="Badge Number">
<input id="cell" placeholder="Cell">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">

<select id="dept">
<option>LOS SANTOS POLICE DEPARTMENT</option>
<option>LOS SANTOS SHERIFF</option>
<option>STATE TROOPER</option>
</select>

<label>Photo</label> <input type="file" id="photoUpload">

<label>Badge</label> <input type="file" id="badgeUpload">

</div>

<div class="card" id="card">

<div class="hologram-bg"></div>
<div class="scratches"></div>

<div class="top-title" id="cardDept">LOS SANTOS POLICE DEPARTMENT</div>

<img id="cardPhoto" class="photo">
<img id="cardBadge" class="badge"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/Police_badge.svg/512px-Police_badge.svg.png">

<div class="main-info">

<h1 id="cardName">John Doe</h1>
<h2 id="cardRank">Officer</h2>
<div class="callsign" id="cardCallsign">6-M-10</div>
<div class="extra" id="cardBadgeNum">Badge: 0000</div>
<div class="extra" id="cardAddress">Mission Row</div>

</div>

<div class="bottom-info">
<div id="cardCell"></div>
<div id="cardEmail"></div>
</div>

<div class="barcode"></div>
<div class="barcode-id" id="barcodeID">000000000</div>

<div class="signature-strip">
Chief David Budd
</div>

<div class="footer">LOS SANTOS</div>

</div>

</div>

<div class="download">
<button onclick="downloadCard()">Download</button>
</div>

<script>

/* UPDATE CARD TEXT */

const fields=["name","rank","callsign","badgeNum","cell","email","address"]

fields.forEach(id=>{
document.getElementById(id).addEventListener("input",update)
})

document.getElementById("dept").addEventListener("change",update)

function update(){

document.getElementById("cardName").innerText=
document.getElementById("name").value || "John Doe"

document.getElementById("cardRank").innerText=
document.getElementById("rank").value || "Officer"

document.getElementById("cardCallsign").innerText=
document.getElementById("callsign").value || "6-M-10"

document.getElementById("cardBadgeNum").innerText=
"Badge: " + (document.getElementById("badgeNum").value || "0000")

document.getElementById("cardAddress").innerText=
document.getElementById("address").value || "Mission Row"

document.getElementById("cardCell").innerText=
document.getElementById("cell").value
? "Cell: " + document.getElementById("cell").value : ""

document.getElementById("cardEmail").innerText=
document.getElementById("email").value
? "Email: " + document.getElementById("email").value : ""

document.getElementById("cardDept").innerText=
document.getElementById("dept").value

document.getElementById("barcodeID").innerText=
(document.getElementById("badgeNum").value || "0000") +
"-" + Math.floor(Math.random()*9999)

}

/* PHOTO UPLOAD */

document.getElementById("photoUpload").onchange=e=>{
const file=e.target.files[0]
if(!file)return
const reader=new FileReader()
reader.onload=x=>{
document.getElementById("cardPhoto").src=x.target.result
}
reader.readAsDataURL(file)
}

/* BADGE UPLOAD */

document.getElementById("badgeUpload").onchange=e=>{
const file=e.target.files[0]
if(!file)return
const reader=new FileReader()
reader.onload=x=>{
document.getElementById("cardBadge").src=x.target.result
}
reader.readAsDataURL(file)
}

/* DRAG PHOTO */

interact('.photo').draggable({
listeners:{
move(event){
let x=(parseFloat(event.target.getAttribute('data-x'))||0)+event.dx
let y=(parseFloat(event.target.getAttribute('data-y'))||0)+event.dy

event.target.style.transform=`translate(${x}px,${y}px)`
event.target.setAttribute('data-x',x)
event.target.setAttribute('data-y',y)
}
}
})

/* DOWNLOAD */

function downloadCard(){

html2canvas(document.getElementById("card"),{scale:2}).then(canvas=>{
const link=document.createElement("a")
link.download="police_id_card.png"
link.href=canvas.toDataURL()
link.click()
})

}

</script>

</body>
</html>
