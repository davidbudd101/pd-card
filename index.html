<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PD Card Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0a0a0a;
color:white
}

header{
background:linear-gradient(90deg,#c40000,#ff1a1a);
padding:14px;
text-align:center;
font-weight:700;
letter-spacing:4px
}

.container{
display:flex;
gap:40px;
padding:30px;
justify-content:center;
flex-wrap:wrap
}

.form{
width:320px;
background:#141414;
padding:20px;
border-radius:12px
}

.form input,.form select{
width:100%;
margin:8px 0;
padding:10px;
border-radius:8px;
border:none;
background:#1f1f1f;
color:white
}

/* CARD */

.card{
width:740px;
height:420px;
background:linear-gradient(135deg,#e8e4dc,#d6d1c7);
border-radius:35px;
padding:30px;
position:relative;
color:#222;
box-shadow:0 10px 40px rgba(0,0,0,.7);
overflow:hidden
}

/* FAINT HOLOGRAM BACKGROUND */

.hologram-bg{
position:absolute;
width:120%;
height:120%;
left:-10%;
top:-10%;

background:
linear-gradient(120deg,
rgba(255,0,0,.05),
rgba(255,255,0,.05),
rgba(0,255,255,.05),
rgba(0,0,255,.05));

mix-blend-mode:overlay;
animation:holoMove 12s linear infinite;
pointer-events:none
}

@keyframes holoMove{
0%{transform:translateX(-10%)}
50%{transform:translateX(10%)}
100%{transform:translateX(-10%)}
}

/* SCRATCHES */

.scratches{
position:absolute;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/scratched-metal.png");
opacity:.10;
pointer-events:none
}

/* WORN CARD */

.worn-card{
filter:contrast(92%) brightness(92%);
transform:rotate(-0.8deg)
}

/* PHOTO */

.photo{
position:absolute;
left:40px;
top:90px;
width:140px;
height:140px;
border-radius:12px;
object-fit:cover;
border:3px solid #aaa;
cursor:move
}

/* BADGE */

.badge{
position:absolute;
left:40px;
bottom:80px;
width:120px;

filter:
drop-shadow(0 3px 3px rgba(0,0,0,.6))
contrast(95%)
brightness(95%);

}

/* BADGE METAL SHINE */

.badge::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(
120deg,
rgba(255,255,255,.35),
rgba(255,255,255,0),
rgba(255,255,255,.35)
);

mix-blend-mode:overlay;
opacity:.35
}

/* BADGE WORN EFFECT */

.worn-card .badge{
filter:
grayscale(.1)
contrast(.9)
brightness(.85)
drop-shadow(0 3px 3px rgba(0,0,0,.7));
}

/* TEXT */

.top-title{
text-align:center;
font-weight:700;
letter-spacing:5px
}

.main-info{
position:absolute;
left:220px;
top:100px
}

.main-info h1{
margin:0;
font-size:36px
}

.main-info h2{
margin:5px 0;
font-size:20px;
color:#444
}

.callsign{
font-weight:600;
letter-spacing:2px
}

.extra{
margin-top:10px;
font-size:14px
}

.bottom-info{
position:absolute;
bottom:90px;
left:40px;
font-size:13px
}

/* BARCODE */

.barcode{
position:absolute;
bottom:20px;
left:40px;
height:40px;
width:260px;

background:
repeating-linear-gradient(
90deg,
#000,
#000 2px,
#fff 2px,
#fff 4px
)
}

.barcode-id{
position:absolute;
bottom:20px;
left:320px;
font-size:14px;
letter-spacing:3px
}

/* SIGNATURE */

.signature-strip{
position:absolute;
bottom:60px;
right:40px;
width:220px;
text-align:center;
border-top:2px solid #222;
padding-top:5px;
font-family:'Great Vibes',cursive;
font-size:24px
}

.footer{
position:absolute;
bottom:20px;
right:40px;
font-size:12px;
opacity:.6
}

button{
padding:12px 25px;
background:linear-gradient(90deg,#c40000,#ff1a1a);
border:none;
color:white;
border-radius:8px;
cursor:pointer
}

.download{
text-align:center;
margin-bottom:30px
}

</style>

</head>

<body>

<header>PD CARD DESIGNER</header>

<div class="container">

<div class="form">

<input id="name" placeholder="Name">
<input id="rank" placeholder="Rank">
<input id="callsign" placeholder="Callsign">
<input id="badgeNum" placeholder="Badge Number">
<input id="cell" placeholder="Cell">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">

<select id="dept">
<option>LOS SANTOS POLICE DEPARTMENT</option>
<option>LOS SANTOS SHERIFF</option>
<option>STATE TROOPER</option>
</select>

<select id="theme">
<option value="default">Default</option>
<option value="dark">Dark</option>
<option value="blue">Blue</option>
<option value="worn">Worn</option>
</select>

<label>Photo</label> <input type="file" id="photoUpload">

<label>Badge</label> <input type="file" id="badgeUpload">

</div>

<div class="card" id="card">

<div class="hologram-bg"></div>
<div class="scratches"></div>

<div class="top-title" id="cardDept">LOS SANTOS POLICE DEPARTMENT</div>

<img id="cardPhoto" class="photo">
<img id="cardBadge" class="badge"
src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/Police_badge.svg/512px-Police_badge.svg.png">

<div class="main-info">

<h1 id="cardName">John Doe</h1>
<h2 id="cardRank">Officer</h2>
<div class="callsign" id="cardCallsign">6-M-10</div>
<div class="extra" id="cardBadgeNum">Badge: 0000</div>
<div class="extra" id="cardAddress">Mission Row</div>

</div>

<div class="bottom-info">
<div id="cardCell"></div>
<div id="cardEmail"></div>
</div>

<div class="barcode"></div>
<div class="barcode-id" id="barcodeID">000000000</div>

<div class="signature-strip">
Chief David Budd
</div>

<div class="footer">LOS SANTOS</div>

</div>

</div>

<div class="download">
<button onclick="downloadCard()">Download</button>
</div>

<script>

const ids=["name","rank","callsign","badgeNum","cell","email","address"]

ids.forEach(id=>{
document.getElementById(id).addEventListener("input",update)
})

document.getElementById("dept").addEventListener("change",update)
document.getElementById("theme").addEventListener("change",update)

function update(){

cardName.innerText=name.value||"John Doe"
cardRank.innerText=rank.value||"Officer"
cardCallsign.innerText=callsign.value||"6-M-10"
cardBadgeNum.innerText="Badge: "+(badgeNum.value||"0000")
cardAddress.innerText=address.value||"Mission Row"

cardCell.innerText=cell.value?"Cell: "+cell.value:""
cardEmail.innerText=email.value?"Email: "+email.value:""

cardDept.innerText=dept.value

barcodeID.innerText=(badgeNum.value||"0000")+"-"+Math.floor(Math.random()*9999)

const themeVal=theme.value
const card=document.getElementById("card")

card.classList.remove("worn-card")

if(themeVal==="dark"){
card.style.background="#333"
card.style.color="#fff"
}
else if(themeVal==="blue"){
card.style.background="#1e2f4d"
card.style.color="#fff"
}
else if(themeVal==="worn"){
card.style.background="linear-gradient(135deg,#e8e4dc,#d6d1c7)"
card.style.color="#222"
card.classList.add("worn-card")
}
else{
card.style.background="linear-gradient(135deg,#e8e4dc,#d6d1c7)"
card.style.color="#222"
}

}

photoUpload.onchange=e=>{
const f=e.target.files[0]
if(!f)return
const r=new FileReader()
r.onload=x=>{cardPhoto.src=x.target.result}
r.readAsDataURL(f)
}

badgeUpload.onchange=e=>{
const f=e.target.files[0]
if(!f)return
const r=new FileReader()
r.onload=x=>{cardBadge.src=x.target.result}
r.readAsDataURL(f)
}

interact('.photo')
.draggable({
listeners:{
move(event){
let x=(parseFloat(event.target.getAttribute('data-x'))||0)+event.dx
let y=(parseFloat(event.target.getAttribute('data-y'))||0)+event.dy
event.target.style.transform=`translate(${x}px,${y}px)`
event.target.setAttribute('data-x',x)
event.target.setAttribute('data-y',y)
}
}
})
.resizable({
edges:{left:true,right:true,bottom:true,top:true}
})
.on('resizemove',event=>{
let target=event.target
target.style.width=event.rect.width+'px'
target.style.height=event.rect.height+'px'
})

function downloadCard(){

const card=document.getElementById("card")

html2canvas(card,{scale:2,useCORS:true}).then(canvas=>{
const link=document.createElement("a")
link.download="police_id_card.png"
link.href=canvas.toDataURL("image/png")
link.click()
})

}

</script>

</body>
</html>
